<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 대시보드 | Seolin SafeCheck</title>
    <link rel="stylesheet" href="../../src/styles/admin.css">
  </head>
  <body>
    <div class="admin-shell">
      <aside class="admin-sidebar" aria-label="관리자 메뉴">
        <div class="sidebar-brand">
          <img src="../../assets/images/seolin-logo-box.png" alt="서린태권도 로고">
          <div>
            <strong>Seolin SafeCheck</strong>
            <span>관리자</span>
          </div>
        </div>

        <nav class="admin-nav">
          <a href="./" aria-current="page">대시보드</a>
          <a href="../students/">원생 관리</a>
          <a href="../vehicles/">차량 관리</a>
          <a href="../schedules/">시간표 관리</a>
          <a href="../attendance/">출결 기록</a>
          <a href="#" aria-disabled="true" data-planned-nav>엑셀 관리 <span class="planned-label">준비 중</span></a>
          <a href="#" aria-disabled="true" data-planned-nav>SMS 설정 <span class="planned-label">준비 중</span></a>
        </nav>
      </aside>

      <main class="admin-main">
        <header class="admin-header">
          <div class="admin-user">
            <strong id="admin-display-name">관리자</strong>
            <span id="admin-account-id">계정 확인 중</span>
          </div>
          <button id="logout-button" class="secondary-button" type="button">로그아웃</button>
        </header>

        <section class="admin-content">
          <div class="page-title">
            <div>
              <p class="eyebrow">대시보드</p>
              <h1>관리자 현황</h1>
              <p>원생 관리에 필요한 기본 현황만 표시합니다.</p>
            </div>
          </div>

          <div id="overview-grid" class="metric-grid" aria-live="polite"></div>
          <p id="overview-message" class="message" role="status" aria-live="polite"></p>
        </section>
      </main>
    </div>

    <script type="module" src="../../src/app/admin/home.js"></script>
  </body>
</html>
