<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>원생 관리 | Seolin SafeCheck</title>
    <link rel="stylesheet" href="../../src/styles/admin.css">
  </head>
  <body>
    <div class="admin-shell">
      <aside class="admin-sidebar" aria-label="관리자 메뉴">
        <div class="sidebar-brand">
          <img src="../../assets/images/seolin-logo-box.png" alt="서린태권도 로고">
          <div>
            <strong>Seolin SafeCheck</strong>
            <span>관리자</span>
          </div>
        </div>

        <nav class="admin-nav">
          <a href="../home/">대시보드</a>
          <a href="./" aria-current="page">원생 관리</a>
          <a href="../vehicles/">차량 관리</a>
          <a href="../schedules/">시간표 관리</a>
          <a href="../attendance/">출결 기록</a>
          <a href="#" aria-disabled="true" data-planned-nav>엑셀 관리 <span class="planned-label">준비 중</span></a>
          <a href="#" aria-disabled="true" data-planned-nav>SMS 설정 <span class="planned-label">준비 중</span></a>
        </nav>
      </aside>

      <main class="admin-main">
        <header class="admin-header">
          <div class="admin-user">
            <strong id="admin-display-name">관리자</strong>
            <span id="admin-account-id">계정 확인 중</span>
          </div>
          <button id="logout-button" class="secondary-button" type="button">로그아웃</button>
        </header>

        <section class="admin-content">
          <div class="page-title">
            <div>
              <p class="eyebrow">원생 관리</p>
              <h1>원생 목록</h1>
              <p>원생 이름과 기본 탑승 장소를 관리합니다. 학부모 연락처 원문은 표시하지 않습니다.</p>
            </div>
            <button id="add-student-button" class="primary-button" type="button">원생 추가</button>
          </div>

          <div class="toolbar">
            <input
              id="student-search"
              class="search-input"
              type="search"
              placeholder="원생 이름 검색"
              aria-label="원생 이름 검색"
            >
            <p id="student-message" class="message" role="status" aria-live="polite"></p>
          </div>

          <section class="panel table-panel" aria-label="원생 목록">
            <table class="data-table">
              <thead>
                <tr>
                  <th scope="col">원생 이름</th>
                  <th scope="col">탑승 장소</th>
                  <th scope="col">연락처 상태</th>
                  <th scope="col">상태</th>
                  <th scope="col">원생 ID</th>
                  <th scope="col">작업</th>
                </tr>
              </thead>
              <tbody id="student-table-body"></tbody>
            </table>
          </section>
        </section>
      </main>
    </div>

    <dialog id="student-dialog" class="student-dialog">
      <form id="student-form" class="form-stack" method="dialog" novalidate>
        <h2 id="student-dialog-title">원생 추가</h2>
        <input id="student-id" type="hidden">

        <label class="field">
          <span>원생 이름</span>
          <input id="student-name" name="studentName" type="text" autocomplete="off">
        </label>

        <label class="field">
          <span>탑승 장소</span>
          <input id="pickup-place" name="pickupPlace" type="text" autocomplete="off">
        </label>

        <label class="checkbox-field">
          <input id="is-active" name="isActive" type="checkbox" checked>
          <span>활성 원생</span>
        </label>

        <div class="dialog-actions">
          <button id="cancel-student-button" class="secondary-button" type="button">취소</button>
          <button id="save-student-button" class="primary-button" type="submit">저장</button>
        </div>
      </form>
    </dialog>

    <dialog id="deactivate-dialog" class="student-dialog">
      <form class="form-stack" method="dialog">
        <h2>원생 비활성화</h2>
        <p id="deactivate-message" class="helper-note"></p>
        <div class="dialog-actions">
          <button id="cancel-deactivate-button" class="secondary-button" type="button">취소</button>
          <button id="confirm-deactivate-button" class="danger-button" type="button">비활성화</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="../../src/app/admin/students.js"></script>
  </body>
</html>
