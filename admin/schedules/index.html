<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>시간표 관리 | Seolin SafeCheck</title>
    <link rel="stylesheet" href="../../src/styles/admin.css">
  </head>
  <body>
    <div class="admin-shell">
      <aside class="admin-sidebar" aria-label="관리자 메뉴">
        <div class="sidebar-brand">
          <img src="../../assets/images/seolin-logo-box.png" alt="서린태권도 로고">
          <div>
            <strong>Seolin SafeCheck</strong>
            <span>관리자</span>
          </div>
        </div>
        <nav class="admin-nav">
          <a href="../home/">대시보드</a>
          <a href="../students/">원생 관리</a>
          <a href="../vehicles/">차량 관리</a>
          <a href="./" aria-current="page">시간표 관리</a>
          <a href="../attendance/">출결 기록</a>
          <a href="#" aria-disabled="true" data-planned-nav>엑셀 관리 <span class="planned-label">준비 중</span></a>
          <a href="#" aria-disabled="true" data-planned-nav>SMS 설정 <span class="planned-label">준비 중</span></a>
        </nav>
      </aside>

      <main class="admin-main">
        <header class="admin-header">
          <div class="admin-user">
            <strong id="admin-display-name">관리자</strong>
            <span id="admin-account-id">계정 확인 중</span>
          </div>
          <button id="logout-button" class="secondary-button" type="button">로그아웃</button>
        </header>

        <section class="admin-content">
          <div class="page-title">
            <div>
              <p class="eyebrow">시간표 관리</p>
              <h1>등원 시간표</h1>
              <p>차량별 등원 시간대와 원생 배정을 관리합니다.</p>
            </div>
            <button id="add-schedule-button" class="primary-button" type="button">시간표 추가</button>
          </div>

          <div class="toolbar">
            <p id="schedule-message" class="message" role="status" aria-live="polite"></p>
          </div>

          <section class="panel schedule-selector" aria-label="요일 및 차량 선택">
            <div>
              <span class="selector-label">요일</span>
              <div id="weekday-buttons" class="selector-buttons"></div>
            </div>
            <div>
              <span class="selector-label">차량</span>
              <div id="vehicle-buttons" class="selector-buttons"></div>
            </div>
          </section>

          <section class="panel table-panel" aria-label="시간표 목록">
            <table class="data-table">
              <thead>
                <tr>
                  <th scope="col">차량</th>
                  <th scope="col">시간대 이름</th>
                  <th scope="col">시작 시간</th>
                  <th scope="col">배정 원생 수</th>
                  <th scope="col">상태</th>
                  <th scope="col">작업</th>
                </tr>
              </thead>
              <tbody id="schedule-table-body"></tbody>
            </table>
          </section>
        </section>
      </main>
    </div>

    <dialog id="schedule-dialog" class="student-dialog">
      <form id="schedule-form" class="form-stack" method="dialog" novalidate>
        <h2 id="schedule-dialog-title">시간표 추가</h2>
        <input id="schedule-id" type="hidden">
        <p id="schedule-context" class="helper-note"></p>
        <label class="field">
          <span>차량</span>
          <select id="schedule-vehicle" name="vehicleId" disabled></select>
        </label>
        <label class="field">
          <span>시간대 이름</span>
          <input id="schedule-name" name="scheduleName" type="text" autocomplete="off">
        </label>
        <label class="field">
          <span>시작 시간</span>
          <input id="schedule-start-time" name="startTime" type="time">
        </label>
        <label class="checkbox-field">
          <input id="schedule-is-active" name="isActive" type="checkbox" checked>
          <span>활성 시간표</span>
        </label>
        <div class="dialog-actions">
          <button id="cancel-schedule-button" class="secondary-button" type="button">취소</button>
          <button id="save-schedule-button" class="primary-button" type="submit">저장</button>
        </div>
      </form>
    </dialog>

    <dialog id="assignment-dialog" class="student-dialog assignment-dialog">
      <form id="assignment-form" class="form-stack" method="dialog" novalidate>
        <h2 id="assignment-dialog-title">원생 배정</h2>
        <p class="helper-note">배정할 원생을 선택해주세요.</p>
        <div id="assignment-list" class="assignment-list"></div>
        <div class="dialog-actions">
          <button id="cancel-assignment-button" class="secondary-button" type="button">취소</button>
          <button id="save-assignment-button" class="primary-button" type="submit">배정 저장</button>
        </div>
      </form>
    </dialog>

    <dialog id="schedule-deactivate-dialog" class="student-dialog">
      <form class="form-stack" method="dialog">
        <h2>시간표 비활성화</h2>
        <p id="schedule-deactivate-message" class="helper-note"></p>
        <div class="dialog-actions">
          <button id="cancel-schedule-deactivate-button" class="secondary-button" type="button">취소</button>
          <button id="confirm-schedule-deactivate-button" class="danger-button" type="button">비활성화</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="../../src/app/admin/schedules.js"></script>
  </body>
</html>
