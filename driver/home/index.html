<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>기사님 홈 | Seolin SafeCheck</title>
    <link rel="stylesheet" href="../../src/styles/driver.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar" aria-label="기사님 계정 정보">
        <div>
          <p class="eyebrow">Seolin SafeCheck</p>
          <h1>오늘 등원 차량</h1>
        </div>
        <button id="logout-button" class="secondary-button" type="button">로그아웃</button>
      </header>

      <section class="panel vehicle-summary" aria-label="오늘 운행 정보">
        <p id="today-label" class="date-label"></p>
        <h2 id="vehicle-name">호차 정보를 불러오는 중입니다</h2>
        <p id="account-name" class="muted"></p>
      </section>

      <section class="schedule-section" aria-labelledby="schedule-title">
        <div class="section-header">
          <p class="eyebrow">시간대 선택</p>
          <h2 id="schedule-title">운행 시간대를 선택하세요</h2>
          <p class="muted">선택한 시간대의 탑승 확인 화면은 다음 단계에서 구현합니다.</p>
        </div>

        <div id="schedule-list" class="schedule-list" aria-live="polite"></div>
        <p id="schedule-message" class="message message--info" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="../../src/app/driver/home.js"></script>
  </body>
</html>
