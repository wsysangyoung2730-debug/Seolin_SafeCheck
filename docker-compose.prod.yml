services:
  db:
    image: postgres:16-alpine
    container_name: seolin-safecheck-prod-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - seolin_safecheck_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./server
    container_name: seolin-safecheck-prod-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: ${DATABASE_URL}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      SMS_REAL_SEND_ENABLED: ${SMS_REAL_SEND_ENABLED:-false}
      SMS_TEST_MODE: ${SMS_TEST_MODE:-true}
      SMS_TEST_TO: ${SMS_TEST_TO:-}
      SOLAPI_API_KEY: ${SOLAPI_API_KEY:-}
      SOLAPI_API_SECRET: ${SOLAPI_API_SECRET:-}
      SOLAPI_SENDER_NUMBER: ${SOLAPI_SENDER_NUMBER:-}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: seolin-safecheck-prod-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  seolin_safecheck_pgdata:
